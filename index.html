<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
}

/* Iframe */
iframe {
  width: 100%;
  height: calc(100vh - 45px);
  border: 0;
}

/* Developer Bar */
.developerBar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: linear-gradient(45deg, #111, #2563eb);
  color: #fff;
  padding: 4px 0;
  font-size: 14px;
  font-weight: 600;
  z-index: 9999;
  box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.25);
}

.developerBar marquee {
  width: 100%;
}

/* Mobile */
@media (max-width: 768px) {
  iframe {
    height: calc(100vh - 42px);
  }

  .developerBar {
    font-size: 14px;
    padding: 3px 0;
  }
}
</style>
</head>
